<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        NOTE: ES modules (type="module") require a real HTTP server.
        Run with: python -m http.server 8080  (from client-web/)
        or serve via the Flask static folder.
    -->
    <title>WhatSaS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar is hidden until the user is authenticated -->
    <header id="navbar" hidden>
        <div class="nav-brand">WhatSaS</div>
        <nav>
            <button class="btn-link" id="nav-inbox">Inbox</button>
            <button class="btn-link" id="nav-compose">Compose</button>
            <button class="btn-link" id="nav-logout">Logout</button>
        </nav>
    </header>

    <!-- All views are rendered into this container by app.js -->
    <main id="app"></main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
