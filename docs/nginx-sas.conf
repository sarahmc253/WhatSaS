server {
    listen 80;
    server_name 200.69.13.70;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name sas.theburkenator.com 200.69.13.70;

    root /home/student/WhatSaS/client-web;
    index index.html;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://sepolia.infura.io; style-src 'self'; img-src 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/(auth|messages|flush|users) {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
